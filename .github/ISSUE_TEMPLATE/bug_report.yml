name: Bug Report / 缺陷报告
description: Report broken behavior / 报告异常行为
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: background
    attributes:
      label: Background / 背景
      description: What happened? / 发生了什么？
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps / 复现步骤
      description: Provide the shortest reproducible steps. / 提供最短可复现步骤。
      placeholder: |
        1. 
        2. 
        3. 
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior / 期望行为
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior / 实际行为
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification / 验证信息
      description: Browser, route, logs, screenshots, or recordings. / 浏览器、路由、日志、截图或录屏。
